app_name: wald-agent-reference
chunk_size: 900
chunk_overlap: 150
top_k: 5
chat_model: gemini-2.5-flash
vision_model: gemini-2.5-flash
embedding_model: gemini-embedding-001
llm_provider: groq
enable_llm_formatting: true
vector_backend: auto
vector_dim: 256
vector_weight: 0.7
lexical_weight: 0.3
retrieval_backend: auto
vector_store_dir: outputs/vector_store
structured_store_path: outputs/structured_memory.db
memory_backend: supermemory
supermemory_container_tag: wald-agent-reference
supermemory_search_mode: hybrid
log_level: INFO
log_file: outputs/logs/agent.log
plot_dpi: 150
output_dir: outputs
reports_dir: outputs/reports
plots_dir: outputs/plots
chats_dir: outputs/chats
